{% extends "common.html" %}
{% load static %}
{% block content %}


    <div class="container-fluid pb-5 bg-primary hero-header">
        <div class="container py-5">
            <div class="row g-3 align-items-center">
                <div class="col-lg-6 text-center text-lg-start">
                    <h1 class="display-1 mb-0 animated slideInLeft">OTP</h1>
                </div>
                <div class="col-lg-6 animated slideInRight">
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb justify-content-center justify-content-lg-end mb-0">
                            <li class="breadcrumb-item"><a class="text-primary" href="#!">Home</a></li>
                            <li class="breadcrumb-item"><a class="text-primary" href="#!">Pages</a></li>
                            <li class="breadcrumb-item text-secondary active" aria-current="page">OTP</li>
                        </ol>
                    </nav>
                </div>
            </div>
        </div>
    </div>

    <div class="container-fluid py-5">
        <div class="container py-5">
            <div class="text-center wow fadeIn" data-wow-delay="0.1s">
                <h1 class="mb-5">One Time Password <span class="text-uppercase text-primary bg-light px-2">OTP</span></h1>
            </div>
            <div class="row justify-content-center">
                <div class="col-lg-7">
                    <div class="wow fadeIn" data-wow-delay="0.3s">
                        <form method="post" action="{% url 'otp' %}">
                             {% csrf_token %}
                            <div class="row g-3">
                                <div class="col-md-12">
                                    <div class="form-floating">
                                        <input type="tel" maxlength="6" class="form-control" id="otp" name="uotp" placeholder="Your OTP" required>
                                        <label for="email">Your OTP</label>
                                    </div>
                                </div>
                                <div>OTP expires in: <span id="timer">1:00</span></div>
                                <a href="{% url 'resend_otp' %}" id="resend-link" style="display:none;">Resend OTP</a>
                                <div class="col-12">
                                    <button class="btn btn-primary w-100 py-3" id="submit-btn" type="submit">Verify OTP</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <script>
        let timeLeft = parseInt("{{ seconds_left|default:0 }}"); 

        let timerElement = document.getElementById('timer');
        let resendLink = document.getElementById('resend-link');
        let submitBtn = document.getElementById('submit-btn'); 

        let countdown = setInterval(function() {
            if (timeLeft <= 0) {
                clearInterval(countdown);
                timerElement.innerHTML = "0:00 (Expired)";
                resendLink.style.display = "block"; 
                submitBtn.disabled = true; 
                return;
            }

            let minutes = Math.floor(timeLeft / 60);
            let seconds = timeLeft % 60;
            seconds = seconds < 10 ? '0' + seconds : seconds;

            timerElement.innerHTML = minutes + ":" + seconds;
            timeLeft--;
        }, 1000);
    </script>

    {% endblock %}
